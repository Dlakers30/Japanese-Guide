// ── Voice setup ────────────────────────────────────────────────────────────
let jpVoice = null, enVoice = null, currentSpeed = 0.85, isPlayingAll = false;

function loadVoices() {
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return;
  const jpSel = document.getElementById('jpVoice');
  const enSel = document.getElementById('enVoice');
  jpSel.innerHTML = ''; enSel.innerHTML = '';
  const jpVoices = voices.filter(v => v.lang.startsWith('ja'));
  const enVoices = voices.filter(v => v.lang.startsWith('en'));
  jpVoices.forEach((v, i) => { const o = document.createElement('option'); o.value=i; o.textContent=v.name; jpSel.appendChild(o); });
  enVoices.forEach((v, i) => { const o = document.createElement('option'); o.value=i; o.textContent=v.name; enSel.appendChild(o); });
  jpVoice = jpVoices[0] || null;
  enVoice = enVoices[0] || null;
  jpSel.onchange = () => { jpVoice = jpVoices[jpSel.value]; };
  document.getElementById('voiceStatus').textContent = jpVoice
    ? '✓ Japanese voice ready'
    : '⚠ No Japanese voice — install Japanese in device language settings';
}
window.speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speak(text, onEnd) {
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.voice = jpVoice; utt.lang = 'ja-JP'; utt.rate = currentSpeed; utt.pitch = 1.0;
  utt.onend = onEnd || null;
  window.speechSynthesis.speak(utt);
}

function speakPhrase(jp, en, btnEl) {
  stopAll();
  document.getElementById('npJp').textContent = jp;
  document.getElementById('npEn').textContent = en;
  document.getElementById('nowPlaying').classList.add('visible');
  if (btnEl) { btnEl.textContent = '⏸'; btnEl.classList.add('playing'); }
  speak(jp, () => {
    if (btnEl) { btnEl.textContent = '🔊'; btnEl.classList.remove('playing'); }
    document.getElementById('nowPlaying').classList.remove('visible');
  });
}

function stopAll() {
  window.speechSynthesis.cancel(); isPlayingAll = false;
  document.getElementById('nowPlaying').classList.remove('visible');
  document.querySelectorAll('.play-btn').forEach(b => { b.textContent='🔊'; b.classList.remove('playing'); });
  document.querySelectorAll('.play-all-btn').forEach(b => { b.textContent='▶ Play All'; b.classList.remove('stop'); b.onclick=()=>playAll(b.dataset.unit); });
  document.querySelectorAll('.phrase-card').forEach(c => c.classList.remove('playing'));
  const p = document.getElementById('progressText'); if (p) p.textContent='';
}

function playAll(unitId) {
  stopAll();
  const unit = units.find(u => u.id===unitId); if (!unit) return;
  const allPhrases = unit.sections.flatMap(s => s.phrases);
  isPlayingAll = true;
  const btn = document.getElementById('play-all-'+unitId);
  if (btn) { btn.textContent='■ Stop'; btn.classList.add('stop'); btn.onclick=stopAll; }
  let i = 0;
  function playNext() {
    if (!isPlayingAll || i>=allPhrases.length) { stopAll(); return; }
    const p = allPhrases[i];
    const prog = document.getElementById('progressText');
    if (prog) prog.textContent = (i+1)+' / '+allPhrases.length;
    document.getElementById('npJp').textContent = p.jp;
    document.getElementById('npEn').textContent = p.en;
    document.getElementById('nowPlaying').classList.add('visible');
    speak(p.jp, () => { if (!isPlayingAll) return; i++; setTimeout(playNext, 900); });
  }
  playNext();
}

function setSpeed(rate) {
  currentSpeed = rate;
  document.querySelectorAll('.speed-btn').forEach(b => {
    b.classList.toggle('active',
      (rate===0.65 && b.textContent==='Slow') ||
      (rate===0.85 && b.textContent==='Normal') ||
      (rate===1.0  && b.textContent==='Fast'));
  });
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderTabs() {
  const el = document.getElementById('tabs');
  units.forEach((u,i) => {
    const t = document.createElement('div');
    t.className = 'tab'+(i===0?' active':'');
    t.textContent = u.tab; t.onclick = ()=>switchTab(u.id);
    el.appendChild(t);
  });
}

function switchTab(unitId) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', units[i].id===unitId));
  document.querySelectorAll('.unit').forEach(u => u.classList.toggle('active', u.id==='unit-'+unitId));
  stopAll();
}

function esc(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function renderUnits() {
  const content = document.getElementById('content');
  units.forEach(unit => {
    const div = document.createElement('div');
    div.className = 'unit'+(unit.id===units[0].id?' active':'');
    div.id = 'unit-'+unit.id;

    let html = `<div class="unit-title">${unit.title}</div>
      <div class="unit-sub">${unit.sub}</div>
      <div class="play-all-bar">
        <button class="play-all-btn" id="play-all-${unit.id}" data-unit="${unit.id}" onclick="playAll('${unit.id}')">▶ Play All</button>
        <span class="speed-label">Speed:</span>
        <button class="speed-btn" onclick="setSpeed(0.65)">Slow</button>

      </div>`;

    unit.sections.forEach(sec => {
      const c = sec.color || '';
      html += `<div class="section-divider ${c}">${sec.title}</div>`;
      sec.phrases.forEach(p => {
        const rc = p.role==='staff'?'staff':p.role==='you'?'you':'';
        const bc = p.role==='you'?'you-btn':'';
        const lbl = p.role==='staff'?`<div class="card-label staff-lbl">🎌 Staff</div>`
                   :p.role==='you'  ?`<div class="card-label you-lbl">👤 You</div>`:'';
        html += `<div class="phrase-card ${rc}">
          ${lbl}
          <button class="play-btn ${bc}" onclick="speakPhrase('${esc(p.jp)}','${esc(p.en)}',this)">🔊</button>
          <div class="jp-text">${p.jp}</div>
          <div class="romaji">${p.rom}</div>
          <div class="english">${p.en}</div>
          ${p.note?`<div class="note">★ ${p.note}</div>`:''}
        </div>`;
      });
    });

    div.innerHTML = html;
    content.appendChild(div);
  });
}

let kanaPlayInterval = null;
function playKanaAll(which) {
  stopAll();
  const div = document.getElementById('unit-kana');
  const cells = which === 'hira' ? div._hiraAll : div._kataAll;
  isPlayingAll = true;
  document.getElementById('kana-stop').style.display = 'inline-block';
  let i = 0;
  function next() {
    if (!isPlayingAll || i >= cells.length) {
      document.getElementById('kana-stop').style.display = 'none';
      stopAll(); return;
    }
    const cell = cells[i];
    document.getElementById('npJp').textContent = cell.c;
    document.getElementById('npEn').textContent = cell.r;
    document.getElementById('nowPlaying').classList.add('visible');
    speak(cell.c, () => { if (!isPlayingAll) return; i++; setTimeout(next, 600); });
  }
  next();
}

function speakKana(char, rom, cellId) {
  stopAll();
  document.querySelectorAll('.kana-cell').forEach(c => c.classList.remove('playing'));
  const el = document.getElementById(cellId);
  if (el) el.classList.add('playing');
  document.getElementById('npJp').textContent = char;
  document.getElementById('npEn').textContent = rom;
  document.getElementById('nowPlaying').classList.add('visible');
  speak(char, () => {
    if (el) el.classList.remove('playing');
    document.getElementById('nowPlaying').classList.remove('visible');
  });
}

// ── iOS Audio Unlock ───────────────────────────────────────────────────────
// iOS requires a user gesture before speech synthesis will work.
// We prime it silently on first tap anywhere.
let audioUnlocked = false;
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;
  const utt = new SpeechSynthesisUtterance('');
  utt.volume = 0;
  window.speechSynthesis.speak(utt);
}
document.addEventListener('touchstart', unlockAudio, { once: true });
document.addEventListener('click', unlockAudio, { once: true });

// ── iOS Install Banner ─────────────────────────────────────────────────────
function dismissBanner() {
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('installDismissed', '1');
}

function checkInstallBanner() {
  // Only show on iOS Safari when NOT already installed as PWA
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone === true;
  const wasDismissed = localStorage.getItem('installDismissed');
  if (isIOS && !isStandalone && !wasDismissed) {
    setTimeout(() => {
      document.getElementById('installBanner').classList.add('show');
    }, 1500);
  }
}
checkInstallBanner();

// ── Service Worker Registration ────────────────────────────────────────────
// Caches the guide for offline use after first load
if ('serviceWorker' in navigator) {
  // Inline service worker as a blob so it works from a single HTML file
  const swCode = `
    const CACHE = 'jp-guide-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(resp => {
          const clone = resp.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
          return resp;
        }).catch(() => caches.match(e.request)))
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
